format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

app:
  envs:
  - TEST_APP_URL: https://github.com/bitrise-io/Bitrise-Android-Sample
  - TEST_APP_BRANCH: main

workflows:
  _disabled_test_emulator_basic:
    envs:
    - EMU_VER: 34
    - PROFILE: pixel
    - ABI: x86_64
    - TAG: google_apis
    - EMU_BUILD_NUMBER: preinstalled
    after_run:
    - _start-emulator
    - _export_emulator_logs
    - _kill-emulator

  _disabled_test_emulator_full_config:
    envs:
    - EMU_VER: 32
    steps:
    - path::./:
        title: AVD Manager
        inputs:
        - api_level: 32
        - tag: google_apis
        - profile: pixel_3_xl
        - abi: x86_64
        - disable_animations: "true"
        - create_command_flags: --sdcard 2048M
        - start_command_flags: -memory 2048
        - emulator_id: emulator
        - emulator_channel: no update
        - emulator_build_number: preinstalled
        - headless_mode: "true"
    - wait-for-android-emulator: {}
    - script:
        is_always_run: true
        title: Export emulator logcat
        inputs:
        - content: |
            #!/bin/bash
            set -uxo pipefail
            $ANDROID_HOME/platform-tools/adb -s "$BITRISE_EMULATOR_SERIAL" logcat -d > "$BITRISE_DEPLOY_DIR/emulator_logcat_$EMU_VER.log"

  test_emulator_debug_tags_init:
    envs:
    - EMU_VER: 34
    - PROFILE: pixel
    - ABI: x86_64
    - TAG: google_apis
    - EMU_BUILD_NUMBER: preinstalled
    steps:
    - path::./:
        title: AVD Manager
        inputs:
        - api_level: $EMU_VER
        - tag: $TAG
        - profile: $PROFILE
        - abi: $ABI
        - emulator_build_number: $EMU_BUILD_NUMBER
        - debug_tags: init
    - wait-for-android-emulator: {}
    - script:
        is_always_run: true
        title: Verify device logcat artifact exists
        inputs:
        - content: |
            #!/bin/bash
            set -euxo pipefail
            LOG_FILE="$BITRISE_DEPLOY_DIR/emulator_device.log"
            test -s "$LOG_FILE"
    after_run:
    - _kill-emulator

  _disabled_test_emulator_custom_build_number:
    envs:
    - EMU_VER: 34
    - PROFILE: pixel
    - ABI: x86_64
    - TAG: google_apis
    - EMU_BUILD_NUMBER: 12325540 # 35.1.21
    after_run:
    - _start-emulator
    - _take_screenshot
    - _kill-emulator
    - _restore_emulator
  _disabled_test_emulator_page_size_16k:
    envs:
    - EMU_VER: 36
    - PROFILE: pixel
    - ABI: x86_64
    - TAG: google_apis_ps16k
    - EMU_BUILD_NUMBER: preinstalled
    after_run:
    - _start-emulator
    - _take_screenshot
    - _kill-emulator

  _disabled_test_emulator_start_28:
    envs:
    - EMU_VER: 28
    - PROFILE: pixel
    - ABI: x86
    - TAG: google_apis
    - EMU_BUILD_NUMBER: preinstalled
    after_run:
    - _start-emulator
    - _take_screenshot
    - _kill-emulator

  _disabled_test_emulator_start_29:
    envs:
    - EMU_VER: 29
    - PROFILE: pixel
    - ABI: x86
    - TAG: google_apis
    - EMU_BUILD_NUMBER: preinstalled
    after_run:
    - _start-emulator
    - _take_screenshot
    - _kill-emulator

  _disabled_test_emulator_start_30:
    envs:
    - EMU_VER: 30
    - PROFILE: pixel_2
    - ABI: x86
    - TAG: google_apis
    - EMU_BUILD_NUMBER: preinstalled
    after_run:
    - _start-emulator
    - _take_screenshot
    - _kill-emulator

  _disabled_test_emulator_start_32:
    envs:
    - EMU_VER: 32
    - PROFILE: pixel_2
    - ABI: x86_64
    - TAG: google_apis
    - EMU_BUILD_NUMBER: preinstalled
    after_run:
    - _start-emulator
    - _run_ui_test_and_take_screenshot
    - _kill-emulator

  _start-emulator:
    steps:
    - path::./:
        title: Step Test
        inputs:
        - profile: $PROFILE
        - api_level: $EMU_VER
        - abi: $ABI
        - tag: $TAG
        - emulator_build_number: $EMU_BUILD_NUMBER
    - script:
        inputs:
        - content: |
            #!/bin/bash
            set -ex

            echo "BITRISE_EMULATOR_SERIAL: $BITRISE_EMULATOR_SERIAL"
            if [ "$BITRISE_EMULATOR_SERIAL" = "emulator-5554" ]
            then
              exit 0
            else
              exit 1
            fi
    - wait-for-android-emulator: {}

  _run_ui_test_and_take_screenshot:
    steps:
    - script:
        inputs:
        - content: |-
            #!/bin/env bash
            set -ex
            rm -rf ./_tmp
    - git::https://github.com/bitrise-steplib/bitrise-step-simple-git-clone.git:
        inputs:
        - repository_url: $TEST_APP_URL
        - clone_into_dir: ./_tmp
        - branch: $TEST_APP_BRANCH
    - gradle-runner@5:
        inputs:
        - build_root_directory: ./_tmp
        - gradle_task: connectedDebugAndroidTest
        - gradlew_path: ./gradlew
        - app_file_include_filter: dontexport
        - test_apk_file_include_filter: dontexport
    - script:
        inputs:
        - content: |
            #!/bin/bash
            set -euxo pipefail

            SCREENSHOT=./_tmp/app/screenshots/test_screenshot.png
            cp $SCREENSHOT $BITRISE_DEPLOY_DIR/screen_$EMU_VER.png

            if [[ "$OSTYPE" == "darwin"* ]]; then
              brew install tesseract
            elif [[ "$OSTYPE" == "linux-gnu"* ]]; then
              sudo apt-get update
              sudo apt-get install tesseract-ocr -y
            fi

            OUT=./_tmp/out
            tesseract -l eng "$SCREENSHOT" "$OUT"
            cat "${OUT}.txt" | grep 'Hello World!'

  _take_screenshot:
    steps:
    - change-workdir:
        inputs:
        - path: $BITRISE_DEPLOY_DIR
    - script:
        inputs:
        - content: |
            #!/bin/bash
            set -euxo pipefail
            sleep 15
            cd $BITRISE_DEPLOY_DIR
            $ANDROID_HOME/platform-tools/adb -s $BITRISE_EMULATOR_SERIAL shell "screencap -p /sdcard/screen.png"
            $ANDROID_HOME/platform-tools/adb -s $BITRISE_EMULATOR_SERIAL pull "/sdcard/screen.png" "./screen_$EMU_VER.png"

  _export_emulator_logs:
    steps:
    - script:
        is_always_run: true
        title: Export emulator logs
        inputs:
        - content: |
            #!/bin/bash
            set -uxo pipefail
            $ANDROID_HOME/platform-tools/adb -s "$BITRISE_EMULATOR_SERIAL" logcat -d > "$BITRISE_DEPLOY_DIR/emulator_logcat_$EMU_VER.log"

  _kill-emulator:
    steps:
    - script:
        is_always_run: true
        inputs:
        - content: |
            #!/bin/bash
            set -x
            adb -s $BITRISE_EMULATOR_SERIAL emu kill
            adb kill-server
            # It takes a bit of time for the simulator to exit
            sleep 15
            adb start-server
            adb devices

  _restore_emulator:
    steps:
    - script:
        is_always_run: true
        title: Restore original emulator
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            rm -rf $ANDROID_HOME/emulator || true
            mv $ANDROID_HOME/emulator_original $ANDROID_HOME/emulator
